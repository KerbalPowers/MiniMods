=================================================
// *** Replace Jettison with End Cap module

@PART[kpaNearSight]
{
	// Remove all existing jettison modules
	-MODULE:HAS[#name[ModuleJettison]] {}

	// Add new module
	MODULE
	{
		name = ModuleEndCap
		nodeNames = top,bottom //node_stack prefix is ignored in ksp code
		showAttached = TopCap,BottomCap //visible transforms when assoc. nodes are occupied
		//showFree = TopStrutA;TopStrutB,BottomStrut //visible transforms when no nodes occupied
	}
}